<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DVD Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 38" width="210" height="38" aria-label="Blockbuster Video">
        <!-- blue ticket background -->
        <rect width="210" height="27" rx="3" fill="#1a2e96"/>
        <!-- BLOCKBUSTER wordmark -->
        <text x="105" y="20.5"
          text-anchor="middle"
          font-family="Impact, 'Arial Narrow', 'Helvetica Condensed', sans-serif"
          font-size="19"
          fill="#c9a84c"
          letter-spacing="1">BLOCKBUSTER</text>
        <!-- VIDEO subtitle -->
        <text x="105" y="36"
          text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="7.5"
          font-weight="800"
          fill="#c9a84c"
          letter-spacing="5.5">VIDEO</text>
      </svg>
    </h1>
    <button class="random-btn" id="random-btn">? PICK UNWATCHED</button>
  </header>

  <main>
    <section class="publisher-section">
      <div class="section-header">
        <h2>CRITERION COLLECTION</h2>
        <button class="add-btn" data-publisher="criterion">+ ADD</button>
      </div>
      <ul class="title-list" id="criterion-list"></ul>
    </section>

    <section class="publisher-section">
      <div class="section-header">
        <h2>ARROW VIDEO</h2>
        <button class="add-btn" data-publisher="arrow">+ ADD</button>
      </div>
      <ul class="title-list" id="arrow-list"></ul>
    </section>

    <section class="publisher-section">
      <div class="section-header">
        <h2>OTHER</h2>
        <button class="add-btn" data-publisher="other">+ ADD</button>
      </div>
      <ul class="title-list" id="other-list"></ul>
    </section>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">&#x2715;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
